name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v5

      - name: Installer Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Exécuter les tests
        run: pytest -v

      - name: Construire l'image Docker
        run: docker build -t python-cicd-lab:${{ github.sha }} .

      - name: Scanner l'image Docker
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: python-cicd-lab:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Démarrer le conteneur
        run: |
          docker run -d \
            --name python-cicd-lab \
            -p 5000:5000 \
            python-cicd-lab:${{ github.sha }}

      - name: Vérifier le health check
        run: |
          sleep 3
          curl --fail http://localhost:5000/health

      - name: Afficher les logs en cas d'échec
        if: failure()
        run: docker logs python-cicd-lab || true
